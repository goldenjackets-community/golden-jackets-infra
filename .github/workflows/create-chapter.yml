name: Create New Chapter

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country name (e.g., Peru)'
        required: true
      code:
        description: 'Country code lowercase (e.g., peru)'
        required: true
      domain:
        description: 'Domain (e.g., goldenjackets.pe)'
        required: true
      leader_name:
        description: 'Chapter Leader full name'
        required: true
      leader_email:
        description: 'Chapter Leader email'
        required: true
      leader_city:
        description: 'Chapter Leader city (e.g., Lima)'
        required: true
      leader_linkedin:
        description: 'Chapter Leader LinkedIn URL'
        required: true
      flag:
        description: 'Country flag emoji (e.g., 🇵🇪)'
        required: true
      simplemaps_code:
        description: 'SimpleMaps 2-letter code (e.g., pe)'
        required: true
      branch:
        description: 'Git branch for new repo'
        required: false
        default: 'master'

permissions:
  id-token: write
  contents: write

jobs:
  create-chapter:
    runs-on: ubuntu-latest
    continue-on-error: false
    env:
      COUNTRY: ${{ github.event.inputs.country }}
      CODE: ${{ github.event.inputs.code }}
      DOMAIN: ${{ github.event.inputs.domain }}
      LEADER_NAME: ${{ github.event.inputs.leader_name }}
      LEADER_EMAIL: ${{ github.event.inputs.leader_email }}
      LEADER_CITY: ${{ github.event.inputs.leader_city }}
      LEADER_LINKEDIN: ${{ github.event.inputs.leader_linkedin }}
      FLAG: ${{ github.event.inputs.flag }}
      SIMPLEMAPS_CODE: ${{ github.event.inputs.simplemaps_code }}
      BRANCH: ${{ github.event.inputs.branch }}
      ACCOUNT: '800712212925'
      REGION: 'us-east-1'
      POOL_ID: 'us-east-1_Z0VzzrmIX'
      REPO_ORG: 'goldenjackets-community'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::800712212925:role/github-actions-deploy
          aws-region: us-east-1

      - name: Set variables
        run: |
          echo "REPO_NAME=golden-jackets-${CODE}" >> $GITHUB_ENV
          echo "BUCKET=${DOMAIN}" >> $GITHUB_ENV
          echo "COUNTER_TABLE=gj-${CODE}-visitors" >> $GITHUB_ENV
          echo "COUNTER_FUNCTION=gj-${CODE}-counter" >> $GITHUB_ENV
          echo "BACKUP_VAULT=gj-${CODE}-backups" >> $GITHUB_ENV

      - name: "1. Route53 Hosted Zone"
        run: |
          HZ_ID=$(aws route53 create-hosted-zone \
            --name "${DOMAIN}" \
            --caller-reference "gj-${CODE}-$(date +%s)" \
            --query 'HostedZone.Id' --output text | sed 's|/hostedzone/||')
          echo "HZ_ID=${HZ_ID}" >> $GITHUB_ENV
          echo "✅ Hosted Zone: ${HZ_ID}"
          aws route53 get-hosted-zone --id ${HZ_ID} --query 'DelegationSet.NameServers' --output table

      - name: "2. ACM Certificate + Validation CNAME"
        run: |
          CERT_ARN=$(aws acm request-certificate \
            --domain-name "${DOMAIN}" \
            --subject-alternative-names "*.${DOMAIN}" \
            --validation-method DNS \
            --query 'CertificateArn' --output text)
          echo "CERT_ARN=${CERT_ARN}" >> $GITHUB_ENV
          sleep 10
          VALIDATION=$(aws acm describe-certificate --certificate-arn "${CERT_ARN}" \
            --query 'Certificate.DomainValidationOptions[0].ResourceRecord' --output json)
          CNAME_NAME=$(echo "$VALIDATION" | jq -r '.Name')
          CNAME_VALUE=$(echo "$VALIDATION" | jq -r '.Value')
          aws route53 change-resource-record-sets --hosted-zone-id ${{ env.HZ_ID }} --change-batch "{
            \"Changes\":[{\"Action\":\"UPSERT\",\"ResourceRecordSet\":{
              \"Name\":\"${CNAME_NAME}\",\"Type\":\"CNAME\",\"TTL\":300,
              \"ResourceRecords\":[{\"Value\":\"${CNAME_VALUE}\"}]}}]}" > /dev/null
          echo "✅ ACM: ${CERT_ARN} + validation CNAME added"

      - name: "3. S3 Bucket"
        run: |
          aws s3 mb "s3://${BUCKET}" 2>/dev/null || true
          aws s3api put-public-access-block --bucket "${BUCKET}" \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
          aws s3 website "s3://${BUCKET}" --index-document index.html --error-document index.html
          aws s3api put-bucket-policy --bucket "${BUCKET}" --policy "{
            \"Version\":\"2012-10-17\",\"Statement\":[{\"Sid\":\"PublicRead\",\"Effect\":\"Allow\",
            \"Principal\":\"*\",\"Action\":\"s3:GetObject\",\"Resource\":\"arn:aws:s3:::${BUCKET}/*\"}]}"
          echo "✅ S3: ${BUCKET}"

      - name: "4. CloudFront"
        run: |
          CF_OUT=$(aws cloudfront create-distribution --distribution-config "{
            \"CallerReference\":\"gj-${CODE}-$(date +%s)\",
            \"Origins\":{\"Quantity\":1,\"Items\":[{\"Id\":\"S3-${BUCKET}\",
              \"DomainName\":\"${BUCKET}.s3-website-${REGION}.amazonaws.com\",
              \"CustomOriginConfig\":{\"HTTPPort\":80,\"HTTPSPort\":443,\"OriginProtocolPolicy\":\"http-only\"}}]},
            \"DefaultCacheBehavior\":{\"TargetOriginId\":\"S3-${BUCKET}\",\"ViewerProtocolPolicy\":\"redirect-to-https\",
              \"AllowedMethods\":{\"Quantity\":2,\"Items\":[\"GET\",\"HEAD\"]},
              \"ForwardedValues\":{\"QueryString\":false,\"Cookies\":{\"Forward\":\"none\"}},
              \"Compress\":true,\"MinTTL\":0,\"DefaultTTL\":86400,\"MaxTTL\":31536000},
            \"Comment\":\"Golden Jackets ${COUNTRY}\",\"Enabled\":true,\"DefaultRootObject\":\"index.html\",
            \"PriceClass\":\"PriceClass_100\",
            \"CustomErrorResponses\":{\"Quantity\":1,\"Items\":[{\"ErrorCode\":404,\"ResponsePagePath\":\"/index.html\",\"ResponseCode\":\"200\",\"ErrorCachingMinTTL\":300}]}
          }" --query 'Distribution.{Id:Id,Domain:DomainName}' --output json)
          echo "CF_DIST_ID=$(echo $CF_OUT | jq -r '.Id')" >> $GITHUB_ENV
          echo "CF_DOMAIN=$(echo $CF_OUT | jq -r '.Domain')" >> $GITHUB_ENV
          echo "✅ CloudFront: $(echo $CF_OUT | jq -r '.Id')"

      - name: "5. DynamoDB + Lambda Counter"
        run: |
          aws dynamodb create-table --table-name "${COUNTER_TABLE}" \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST 2>/dev/null || true
          cat > /tmp/counter.py << 'LAMBDA'
          import json, boto3
          from datetime import datetime
          dynamodb = boto3.resource('dynamodb', region_name='us-east-1')
          table = dynamodb.Table('TABLENAME')
          def lambda_handler(event, context):
              table.update_item(Key={'id':'counter'},UpdateExpression='SET total_visits = if_not_exists(total_visits, :zero) + :one, unique_visitors = if_not_exists(unique_visitors, :zero)',ExpressionAttributeValues={':one':1,':zero':0})
              ip = event.get('requestContext',{}).get('http',{}).get('sourceIp','unknown')
              try:
                  table.put_item(Item={'id':f'ip#{ip}','first_visit':datetime.utcnow().isoformat()},ConditionExpression='attribute_not_exists(id)')
                  table.update_item(Key={'id':'counter'},UpdateExpression='SET unique_visitors = if_not_exists(unique_visitors, :zero) + :one',ExpressionAttributeValues={':one':1,':zero':0})
              except: pass
              resp = table.get_item(Key={'id':'counter'})
              item = resp.get('Item',{})
              return {'statusCode':200,'headers':{'Access-Control-Allow-Origin':'*'},'body':json.dumps({'total_visits':int(item.get('total_visits',0)),'unique_visitors':int(item.get('unique_visitors',0))})}
          LAMBDA
          sed -i "s/TABLENAME/${COUNTER_TABLE}/" /tmp/counter.py
          cd /tmp && zip -j counter.zip counter.py > /dev/null
          aws lambda create-function --function-name "${COUNTER_FUNCTION}" --runtime python3.12 \
            --handler "counter.lambda_handler" --zip-file "fileb:///tmp/counter.zip" \
            --role "arn:aws:iam::${ACCOUNT}:role/gj-apply-lambda" --timeout 10 > /dev/null
          FUNC_URL=$(aws lambda create-function-url-config --function-name "${COUNTER_FUNCTION}" \
            --auth-type NONE --cors '{"AllowOrigins":["*"]}' --query 'FunctionUrl' --output text)
          aws lambda add-permission --function-name "${COUNTER_FUNCTION}" \
            --statement-id FunctionURLAllowPublicAccess --action lambda:InvokeFunctionUrl \
            --principal "*" --function-url-auth-type NONE > /dev/null
          echo "FUNC_URL=${FUNC_URL}" >> $GITHUB_ENV
          echo "✅ DynamoDB + Lambda: ${FUNC_URL}"

      - name: "6. Backup Vault + Cognito"
        run: |
          aws backup create-backup-vault --backup-vault-name "${BACKUP_VAULT}" 2>/dev/null || true
          aws cognito-idp create-group --group-name "${CODE}" --user-pool-id "${POOL_ID}" 2>/dev/null || true \
            --description "Golden Jackets ${COUNTRY}" > /dev/null
          aws cognito-idp admin-create-user --user-pool-id "${POOL_ID}" --username "${LEADER_EMAIL}" \
            --user-attributes Name=email,Value="${LEADER_EMAIL}" Name=email_verified,Value=true \
            --desired-delivery-mediums EMAIL > /dev/null 2>&1 || true
          aws cognito-idp admin-add-user-to-group --user-pool-id "${POOL_ID}" \
            --username "${LEADER_EMAIL}" --group-name "${CODE}"
          echo "✅ Backup + Cognito done"

      - name: "7. IAM Deploy Policy"
        run: |
          POLICY=$(aws iam get-role-policy --role-name github-actions-deploy --policy-name deploy-policy --query 'PolicyDocument' --output json)
          POLICY=$(echo "$POLICY" | python3 -c "
          import sys,json
          p=json.load(sys.stdin)
          s3=next(s for s in p['Statement'] if 's3:PutObject' in s.get('Action',[]))
          for r in ['arn:aws:s3:::${BUCKET}','arn:aws:s3:::${BUCKET}/*']:
              if r not in s3['Resource']: s3['Resource'].append(r)
          cf=next(s for s in p['Statement'] if s.get('Action')=='cloudfront:CreateInvalidation')
          arn='arn:aws:cloudfront::${ACCOUNT}:distribution/${{ env.CF_DIST_ID }}'
          if arn not in cf['Resource']: cf['Resource'].append(arn)
          print(json.dumps(p))
          ")
          aws iam put-role-policy --role-name github-actions-deploy --policy-name deploy-policy --policy-document "${POLICY}"
          echo "✅ IAM policy updated"

      - name: "8. Update gj-apply + CORS"
        run: |
          APPLY_FILE="lambdas/gj-apply/gj_apply.py"
          if ! grep -q "'${DOMAIN}'" "${APPLY_FILE}"; then
            sed -i "/^REPO_MAP = {/a\\    '${DOMAIN}': '${REPO_ORG}/${REPO_NAME}',\n    'www.${DOMAIN}': '${REPO_ORG}/${REPO_NAME}'," "${APPLY_FILE}"
          fi
          CURRENT=$(aws apigatewayv2 get-api --api-id kqiq2bltjd --query 'CorsConfiguration.AllowOrigins' --output json)
          NEW=$(echo "$CURRENT" | python3 -c "
          import sys,json
          o=json.load(sys.stdin)
          for u in ['https://${DOMAIN}','https://www.${DOMAIN}']:
              if u not in o: o.append(u)
          print(json.dumps(o))")
          aws apigatewayv2 update-api --api-id kqiq2bltjd \
            --cors-configuration "{\"AllowOrigins\":${NEW},\"AllowMethods\":[\"POST\",\"OPTIONS\",\"GET\"],\"AllowHeaders\":[\"Content-Type\",\"Authorization\"]}" > /dev/null
          echo "✅ REPO_MAP + CORS"

      - name: "9. Create Chapter Site Repo"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh repo create "${REPO_ORG}/${REPO_NAME}" --public \
            --description "Golden Jackets ${COUNTRY} ${FLAG}" 2>/dev/null || true
          
          # Clone Chile as base
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO_ORG}/golden-jackets-chile.git" site
          cd site && rm -rf .git BACKLOG.md
          git init && git checkout -b ${BRANCH}
          
          # Download map
          curl -sL "https://simplemaps.com/static/svg/country/${SIMPLEMAPS_CODE}/admin1/${SIMPLEMAPS_CODE}.svg" -o "assets/${CODE}-map-regions.svg" || true
          
          # Customize SVG
          if [ -s "assets/${CODE}-map-regions.svg" ]; then
            sed -i 's/fill="[^"]*"/fill="#2d2d4e"/' "assets/${CODE}-map-regions.svg"
            sed -i 's/stroke="[^"]*"/stroke="#555"/' "assets/${CODE}-map-regions.svg"
            sed -i 's/stroke-width="[^"]*"/stroke-width="0.5"/' "assets/${CODE}-map-regions.svg"
            sed -i 's|<g id="features">|<style>\n  path { transition: fill 0.3s; cursor: pointer; }\n  path:hover { fill: #3d3d6e; }\n  text { font-family: Arial, sans-serif; fill: #888; font-weight: 400; text-anchor: middle; pointer-events: none; stroke: none; }\n</style>\n<g id="features">|' "assets/${CODE}-map-regions.svg"
            python3 ${{ github.workspace }}/new-chapter/add-map-labels.py "assets/${CODE}-map-regions.svg"
          fi
          
          rm -f assets/chile-map-regions.svg assets/jacket-chile.png assets/members/*.jpg
          
          # Bulk replace
          find . \( -name "*.html" -o -name "*.js" -o -name "*.xml" -o -name "*.txt" \) -exec sed -i \
            -e "s/Golden Jackets Chile/Golden Jackets ${COUNTRY}/g" \
            -e "s/goldenjackets\.cl/${DOMAIN}/g" \
            -e "s/Chile/${COUNTRY}/g" -e "s/chile/${CODE}/g" \
            -e "s/🇨🇱/${FLAG}/g" \
            -e "s|jacket-chile.png|jacket-${CODE}.png|g" \
            -e "s|chile-map-regions.svg|${CODE}-map-regions.svg|g" {} \;
          
          sed -i 's|max-width:120px|max-width:700px;width:100%|g' index.html
          sed -i "s|s3://goldenjackets.[a-z]*/|s3://${BUCKET}/|g" .github/workflows/deploy.yml
          sed -i "s|d245cwyl4dcv9y.cloudfront.net|${{ env.CF_DOMAIN }}|g" .github/workflows/deploy.yml
          sed -i "s|\"chapter\":\"[a-z]*\"|\"chapter\":\"${CODE}\"|g" .github/workflows/deploy.yml
          
          cat > config.js << CONF
          var GJ_CONFIG = {
            ADMIN_API: 'https://kqiq2bltjd.execute-api.us-east-1.amazonaws.com/admin',
            ADMIN_EMAILS: ['${LEADER_EMAIL}', 'ricardo.gulias@goldenjacketsbrazil.com'],
            CHAPTER: '${CODE}'
          };
          CONF
          
          sed -i "s|https://[a-z0-9]*\.lambda-url\.us-east-1\.on\.aws/|${{ env.FUNC_URL }}|g" index.html
          sed -i "s|Oscar Alexander Gaviria González|${LEADER_NAME}|g" index.html
          sed -i "s|Oscar Gaviria|${LEADER_NAME}|g" index.html
          sed -i "s|https://www.linkedin.com/in/oscar-alexander-gaviria-gonzelez-11286883/|${LEADER_LINKEDIN}|g" index.html
          
          printf "# Golden Jackets ${COUNTRY} ${FLAG}\n\nPush to \`${BRANCH}\` → auto-deploy.\n" > README.md
          
          git add -A && git commit -m "Initial ${COUNTRY} site"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO_ORG}/${REPO_NAME}.git"
          git push -u origin ${BRANCH}
          echo "✅ Site repo created and pushed"

      - name: "10. GitHub Secrets"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set CLOUDFRONT_DIST_ID --repo "${REPO_ORG}/${REPO_NAME}" --body "${{ env.CF_DIST_ID }}"
          gh secret set GH_PAT --repo "${REPO_ORG}/${REPO_NAME}" --body "${GH_TOKEN}"
          echo "✅ Secrets set"

      - name: "11. Commit infra changes"
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add ${COUNTRY} to chapter mappings"
          git push

      - name: "12. Summary"
        run: |
          echo "## 🎉 Chapter Created: ${COUNTRY} ${FLAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | ${DOMAIN} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hosted Zone | ${{ env.HZ_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront | ${{ env.CF_DIST_ID }} (${{ env.CF_DOMAIN }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Counter | ${{ env.FUNC_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | ${REPO_ORG}/${REPO_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Nameservers (send to Chapter Leader):" >> $GITHUB_STEP_SUMMARY
          aws route53 get-hosted-zone --id ${{ env.HZ_ID }} --query 'DelegationSet.NameServers[]' --output text | tr '\t' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⏳ Manual steps remaining:" >> $GITHUB_STEP_SUMMARY
          echo "- Upload leader photo + jacket image to repo" >> $GITHUB_STEP_SUMMARY
          echo "- Highlight country on global map SVG" >> $GITHUB_STEP_SUMMARY
          echo "- Customize region dropdowns" >> $GITHUB_STEP_SUMMARY
          echo "- After DNS: add custom domain to CloudFront + Route53 A records" >> $GITHUB_STEP_SUMMARY
