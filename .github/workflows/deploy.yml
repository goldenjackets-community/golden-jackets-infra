name: Deploy Lambdas

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_GJ }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Package and deploy gj-admin
        run: |
          cd lambdas/gj-admin
          zip -r /tmp/gj-admin.zip .
          aws lambda update-function-code \
            --function-name gj-admin \
            --zip-file fileb:///tmp/gj-admin.zip
          echo "✅ gj-admin deployed"

  deploy-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_GJ }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Package and deploy gj-apply
        run: |
          cd lambdas/gj-apply
          zip -r /tmp/gj-apply.zip .
          aws lambda update-function-code \
            --function-name gj-apply \
            --zip-file fileb:///tmp/gj-apply.zip
          echo "✅ gj-apply deployed"

  deploy-poland-counter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_GJ }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Verify DynamoDB table exists
        run: echo "Table gj-poland-visitors already provisioned"

      - name: Deploy gj-poland-counter Lambda
        run: |
          cd lambdas/gj-poland-counter
          zip -r /tmp/gj-poland-counter.zip .
          
          # Create or update function
          aws lambda get-function --function-name gj-poland-counter 2>/dev/null && \
            aws lambda update-function-code --function-name gj-poland-counter --zip-file fileb:///tmp/gj-poland-counter.zip || \
            aws lambda create-function \
              --function-name gj-poland-counter \
              --runtime python3.12 \
              --handler gj_counter_pl.lambda_handler \
              --zip-file fileb:///tmp/gj-poland-counter.zip \
              --role arn:aws:iam::800712212925:role/gj-apply-lambda \
              --timeout 10
          
          echo "✅ gj-poland-counter deployed"


